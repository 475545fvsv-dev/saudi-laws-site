<script>
var isLoading = false;
var input = document.getElementById('searchInput');
var sendBtn = document.getElementById('sendBtn');

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSearch();
  }
});

function fillSearch(el) {
  input.value = el.textContent.trim();
  input.focus();
}

async function doSearch() {
  var q = input.value.trim();
  if (!q || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;

  document.getElementById('welcomeState').style.display = 'none';
  var ans = document.getElementById('answerSection');
  ans.classList.add('visible');

  var loading = document.getElementById('loadingIndicator');
  var answerText = document.getElementById('answerText');
  var sourcesSection = document.getElementById('sourcesSection');

  loading.style.display = 'flex';
  answerText.style.display = 'none';
  answerText.innerHTML = '';
  sourcesSection.style.display = 'none';

  ans.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    // ✅ هنا التعديل المهم
    var response = await fetch('/.netlify/functions/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ question: q })
    });

    var data = await response.json();

    loading.style.display = 'none';
    answerText.style.display = 'block';

    if (data.answer) {
      answerText.innerHTML = formatAnswer(data.answer);
      showSources();
    } else {
      answerText.innerHTML = '<div class="error-msg">حدث خطأ. يرجى المحاولة مجدداً.</div>';
    }

  } catch (err) {
    loading.style.display = 'none';
    answerText.style.display = 'block';
    answerText.innerHTML = '<div class="error-msg">تعذر الاتصال. يرجى المحاولة مجدداً.</div>';
  }

  isLoading = false;
  sendBtn.disabled = false;
}

function formatAnswer(text) {
  var html = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^###\s(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s(.+)$/gm, '<h3>$1</h3>')
    .replace(/^#\s(.+)$/gm, '<h3>$1</h3>')
    .replace(/^-\s(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)+/g, function(m) {
      return '<ul>' + m + '</ul>';
    })
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

function showSources() {
  var sources = [
    { name: 'نظام الشركات', icon: '🏢', cat: 'التجارية' },
    { name: 'نظام العمل والعمال', icon: '👷', cat: 'العمالية' },
    { name: 'بوابة هيئة الخبراء الرسمية', icon: '📚', cat: 'جميع الأنظمة' }
  ];

  var grid = document.getElementById('sourcesGrid');

  grid.innerHTML = sources.map(function(s, i) {
    return `
      <a class="source-card" href="https://laws.boe.gov.sa" target="_blank">
        <div class="source-num">المصدر #0${i+1}</div>
        <div class="source-name">${s.name}</div>
        <div class="source-meta">هيئة الخبراء • ${s.cat}</div>
      </a>
    `;
  }).join('');

  document.getElementById('sourcesSection').style.display = 'block';
}
</script>
