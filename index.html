<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستشار القانوني السعودي</title>
<style>
body{
  font-family:tajawal;
  background:#0f0f1a;
  color:white;
  text-align:center;
  padding:40px;
}
textarea{
  width:90%;
  height:120px;
  font-size:16px;
  padding:10px;
}
button{
  padding:10px 20px;
  margin-top:10px;
  cursor:pointer;
  border:none;
  background:#c9a227;
  color:black;
  font-weight:bold;
  border-radius:6px;
}
#answer{
  margin-top:30px;
  white-space:pre-wrap;
  min-height:50px;
}
</style>
</head>

<body>

<h2>⚖️ المستشار القانوني الذكي</h2>

<textarea id="q" placeholder="اكتب سؤالك القانوني..."></textarea><br>
<button onclick="ask()">اسأل</button>

<div id="answer"></div>

<script>
async function ask(){
  var q = document.getElementById("q");
  var res = document.getElementById("answer");

  if(!q || !res) return;

  var question = q.value.trim();

  if(!question){
    res.innerText = "اكتب سؤال أول";
    return;
  }

  res.innerText = "جاري التحليل...";

  try{
    const response = await fetch("/.netlify/functions/search", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({question:question})
    });

    const data = await response.json();

    if(data.answer){
      res.innerText = data.answer;
    } else {
      res.innerText = "لا يوجد رد";
    }

  }catch(e){
    console.error(e);
    res.innerText = "حدث خطأ في الاتصال بالسيرفر";
  }
}
</script>

</body>
</html>
